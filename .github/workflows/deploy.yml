name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: chatbotacsregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            chatbotacsregistry.azurecr.io/chatbot-spider:latest
            chatbotacsregistry.azurecr.io/chatbot-spider:${{ github.sha }}
          cache-from: type=registry,ref=chatbotacsregistry.azurecr.io/chatbot-spider:buildcache
          cache-to: type=registry,ref=chatbotacsregistry.azurecr.io/chatbot-spider:buildcache,mode=max

      - name: Deploy to Azure Container Apps
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App revision
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        uses: azure/cli@v2
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name chatbot-ui \
              --resource-group chatbot \
              --image chatbotacsregistry.azurecr.io/chatbot-spider:${{ github.sha }}
