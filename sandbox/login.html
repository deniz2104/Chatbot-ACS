<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – ACS Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-title">ACS Chatbot</h1>
      <p class="auth-subtitle">Autentifică-te pentru a continua</p>

      <div class="form-group">
        <label>Nume utilizator</label>
        <input type="text" placeholder="ex. ionpopescu" />
      </div>

      <div class="form-group">
        <label>Parolă</label>
        <input type="password" placeholder="••••••••" />
      </div>

      <button class="btn-primary" onclick="window.location='chat.html'">Autentifică-te</button>

      <div class="auth-links">
        <a href="register.html">Nu ai cont? Înregistrează-te</a>
        <a href="forgot_password.html">Ai uitat parola?</a>
      </div>
    </div>
  </div>
</body>
</html>
